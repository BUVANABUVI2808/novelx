<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <title>Thank You | Novelx</title>
 
  </head>
<style>
body, html {

  height: 100%;
  margin: 0;
}

.bgimg {
   background-image:url(assets/img/hero-bg.png);
  height: 100%;
  background-position: center;
  background-size: cover;
  position: relative;
  color: black;
  
  font-size: 25px;
}

.topleft {
  position: absolute;
  top: 0;
  left: 16px;
}

.bottomleft {
  position: absolute;
  bottom: 0;
  left: 16px;
}

.middle {
  position: absolute;
  top: 50%;
  left: 50%;
  color:white;
  transform: translate(-50%, -50%);
  text-align: center;
}

hr {
  margin: auto;
  width: 40%;
}
i.fa.fa-check {
    color: green;
    border: 2px solid green;
    padding: 10px;
    border-radius: 50px;
}
</style>
<body>

<div class="bgimg"> 
  <div class="middle">
  <i class="fa fa-check" aria-hidden="true"></i>
    <h1>Thank You!</h1>
    <hr>
    <p>The form was submitted successfully.</p>
  </div> 
</div>

</body>
</html>
